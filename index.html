<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Kamila & Julio - Wedding RSVP</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>

        .date {

body {
    font-family: 'Courier Prime', monospace;
    background-color: #f1ede3;
    color: var(--dark);
    line-height: 1.6;
    position: relative;
    overflow-x: hidden;
}

 /* ==========================
   NATURAL HANDMADE PAPER
   ========================== */

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;

    background-color: #e9dfd2;

    background-image:
        radial-gradient(circle at 7% 14%, rgba(75,58,42,.55) .8px, transparent 1.8px),
        radial-gradient(circle at 13% 33%, rgba(95,70,48,.35) .6px, transparent 1.5px),
        radial-gradient(circle at 22% 8%, rgba(60,45,30,.40) 1.1px, transparent 2px),
        radial-gradient(circle at 31% 26%, rgba(70,52,38,.28) .7px, transparent 1.5px),
        radial-gradient(circle at 41% 18%, rgba(90,65,45,.42) .9px, transparent 1.8px),
        radial-gradient(circle at 53% 12%, rgba(70,52,38,.35) .6px, transparent 1.4px),
        radial-gradient(circle at 63% 27%, rgba(95,70,48,.48) 1.2px, transparent 2.1px),
        radial-gradient(circle at 74% 11%, rgba(65,48,35,.32) .8px, transparent 1.7px),
        radial-gradient(circle at 82% 22%, rgba(85,60,42,.50) 1px, transparent 1.9px),
        radial-gradient(circle at 94% 9%, rgba(70,52,38,.30) .7px, transparent 1.5px),

        radial-gradient(circle at 9% 52%, rgba(75,58,42,.45) .9px, transparent 1.8px),
        radial-gradient(circle at 19% 66%, rgba(95,70,48,.30) .6px, transparent 1.4px),
        radial-gradient(circle at 29% 58%, rgba(70,52,38,.42) 1px, transparent 1.9px),
        radial-gradient(circle at 39% 78%, rgba(60,45,30,.28) .7px, transparent 1.5px),
        radial-gradient(circle at 52% 63%, rgba(90,65,45,.40) .9px, transparent 1.8px),
        radial-gradient(circle at 66% 72%, rgba(75,58,42,.55) 1.3px, transparent 2.2px),
        radial-gradient(circle at 76% 55%, rgba(95,70,48,.30) .6px, transparent 1.4px),
        radial-gradient(circle at 84% 68%, rgba(70,52,38,.45) .9px, transparent 1.8px),
        radial-gradient(circle at 93% 81%, rgba(60,45,30,.35) 1px, transparent 2px);

    background-size: 520px 520px;

    opacity: .9;
}

body::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: -1;

    background-image:
        repeating-radial-gradient(
            circle at center,
            rgba(0,0,0,.025) 0px,
            rgba(0,0,0,.025) 1px,
            transparent 2px,
            transparent 4px
        );

    opacity: 0.06;
}
        /* Language Switcher */
        .language-switcher {
            position: fixed;
            top: 4rem;
            margin-left: 505px;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }
 
        .lang-btn {
            background: none;
            border: none;
            font-family: 'Inter', serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--dark);

        }
 
        .lang-btn.active {
            color: var(--coral);
            opacity: 1;
            font-weight: 600;
        }

            opacity: 1;
            color: var(--brown);
        }

            vertical-align: middle;

        }

        nav {

            top: 0;

        }
 
        nav a {

        /* Hero Section */
       .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0rem 0 0rem 4rem;
    gap: 4rem;
    margin-left: 1rem;

    overflow: hidden;

}

/* ==========================
   ORGANIC PAPER SHAPES
   ========================== */
 
        .hero-content {
            flex: 1;
            animation: fadeInUp 1s ease-out;
        }
 
        .hero-image {
            flex: 1;
            animation: fadeIn 1.2s ease-out;
            padding: 0;
            margin: 0;
            overflow: hidden;
            align-self: flex-start;  /* prevents stretching */
            background-color: rgba(149, 57, 10, 0.06); /* visible placeholder if image fails */
            min-height: 200px;
        }
 
        .hero-image img {
            width: 100%;
            height: auto;
            display: block;           /* removes inline bottom gap */
            border-radius: 0px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);

        .hero-image img.img-error {
            display: none;
        }

        .hero-image .img-fallback {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            color: var(--coral);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-align: center;
            padding: 2rem;
            border: 1px dashed rgba(149, 57, 10, 0.3);
        }

        .hero-image .img-fallback.active {
            display: flex;
        }
 
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
 
        .date {
            font-size: 0.95rem;
            font-family: "Courier Prime", monospace;
            color: var(--coral);
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            font-weight: 500;
        }
 
        .title-logo {
            display: block;
            width: auto;
            height: 5rem;

        :root {
    /* This matches the burnt-orange color in your image */
    --coral: #95390A; 
    --bg-cream: #f6f3ed;
}
 
.button-group {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
}
 
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 260px;

    text-decoration: none;
    text-align: center;

}

}

    border: 1px solid var(--coral);
}
 
.btn-primary:hover,
.btn-primary:active {

}
 
.btn-secondary {

        /* RSVP Form Section */

        }
 
        label {

            color: var(--dark);
            margin-bottom: 0.5rem;

            letter-spacing: 0.5px;
        }
 
        h2 {
            font-family: 'Inter', sans-serif;
        }
 
        input, select, textarea {

            padding: 0.85rem 1rem;

            font-size: 1rem;

        .btn-back {
            flex: 1;

            border: 2px solid var(--coral);
        }
 
        .btn-submit:hover {
            background-color: #AB623F;
            transform: translateY(-2px);
        }
 
        .btn-back:hover {
            background-color: var(--coral);
            color: white;
        }
 
        /* Success Message */
        .success-message {

            animation: fadeIn 0.8s ease-out;

        .success-message.active {

            margin-bottom: 2rem;

            .hero-image img {

            /* FIX: mobile text break — "w" (Polish) and "y" (Spanish) drop to new line */
            .hero p {

            /* Insert zero-width space before "w" and "y" connectors via JS */

                /* FIX: consistent button padding on mobile — match index */
                margin-top: 2rem;
                margin-bottom: 2rem;

            .btn {
                width: 100%;

                padding: 1rem 1rem;

                letter-spacing: 0.1em;
            }
 
            nav {
                position: static;
                padding: 0;
                margin-bottom: 2rem;
            }
 
            nav a {
                display: block;
                margin: 0.5rem 0;
            }
 
       /* Language Switcher */
        .language-switcher {
            position: fixed;
            top: 3.2rem;
            margin-left: 505px;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }
 
        .lang-btn {
            background: none;

            font-family: 'Inter', serif;

        .lang-btn.active {

<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="pl">PL</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>
 
    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <div class="date lang-text" data-en="— 22.05.2027 —" data-pl="— 22.05.2027 —" data-es="— 22.05.2027 —"></div>
            <img src="kamilajulio.png" alt="Kamila & Julio" class="title-logo">
            <p class="lang-text" 
               data-en="invite you to their wedding and wedding celebration in the heart of the Catalan mountains. Join us to celebrate love together and discover the beauty of Spain."
               data-pl="zapraszają Was na swój ślub i wesele w samym sercu katalońskich gór.
Dołączcie do nas, aby wspólnie świętować miłość i odkrywać uroki Hiszpanii."
               data-es="Los invitan a su boda y a la celebración en el corazón de la sierra catalana.
Únanse a nosotros para celebrar el amor y descubrir la belleza de España."></p>
            
            <div class="button-group">
                <a href="rsvp.html" class="btn btn-primary lang-link">
                    <span class="lang-text" data-en="CONFIRM PRESENCE" data-pl="POTWIERDŹ OBECNOŚĆ" data-es="CONFIRMAR PRESENCIA"></span>
                </a>
                <a href="info.html" class="btn btn-secondary lang-link">
                    <span class="lang-text" data-en="WEDDING DAY INFO" data-pl="INFORMACJE O ŚLUBIE" data-es="INFORMACIÓN DEL EVENTO"></span>
                </a>
            </div>
        </div>
        <div class="hero-image">
            <img src="miriam-espacio-ggCBI9mWPY4-unsplash.jpg" alt="Wedding landscape" onerror="this.classList.add('img-error'); this.nextElementSibling.classList.add('active');">
            <div class="img-fallback">Photo unavailable<br>(miriam-espacio-ggCBI9mWPY4-unsplash.jpg)</div>
        </div>
    </section>
 
    <script>
        // Language Management
        const STORAGE_KEY = 'weddingLang';
        const currentLanguage = { lang: 'en' };
 
        function getSavedLanguage() {
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (['en', 'pl', 'es'].includes(urlLang)) {
                return urlLang;
            }
 
            const storedLang = localStorage.getItem(STORAGE_KEY);
            if (['en', 'pl', 'es'].includes(storedLang)) {
                return storedLang;
            }
 
            return 'en';
        }
 
        function updateLangLinks(lang) {
            document.querySelectorAll('a.lang-link').forEach(link => {
                const href = link.getAttribute('href') || '';
                const [pathWithQuery, hash = ''] = href.split('#');
                const [path] = pathWithQuery.split('?');
                const newHref = path + '?lang=' + encodeURIComponent(lang) + (hash ? '#' + hash : '');
                link.setAttribute('href', newHref);
            });
        }

        // Insert soft line-break before Polish "w" and Spanish "y" connectors on mobile
        function applyMobileLineBreaks(lang) {
            if (window.innerWidth > 768) return;
            const p = document.querySelector('.hero p.lang-text');
            if (!p) return;
            // Use the raw data attribute text so we work from clean source each time
            const raw = p.getAttribute('data-' + lang) || '';
            let html = raw
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;');
            if (lang === 'pl') {
                // break opportunity before standalone "w"
                html = html.replace(/ (w) /g, ' <wbr>$1 ');
            } else if (lang === 'es') {
                // break opportunity before standalone "y"
                html = html.replace(/ (y) /g, ' <wbr>$1 ');
            }
            p.innerHTML = html;
        }
 
        function setLanguage(lang) {
            currentLanguage.lang = lang;
            
            // Update active language button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            const isMobile = window.innerWidth <= 768;
            const heroP = document.querySelector('.hero p.lang-text');

            // Update all text elements
            document.querySelectorAll('.lang-text').forEach(el => {
                // On mobile, skip the hero paragraph — applyMobileLineBreaks handles it via innerHTML
                if (isMobile && el === heroP) return;
                const text = el.getAttribute(`data-${lang}`);
                if (text) {
                    el.textContent = text;
                }
            });

            // Auto-shrink button label text if a translation is too wide
            document.querySelectorAll('.btn span.lang-text').forEach(span => {
                span.style.transform = 'scale(1)';
                const btn = span.closest('.btn');
                if (!btn) return;
                const available = btn.clientWidth - 32;
                const needed = span.scrollWidth;
                if (needed > available) {
                    const scale = Math.max(0.78, available / needed);
                    span.style.transform = `scale(${scale})`;
                }
            });

            localStorage.setItem(STORAGE_KEY, lang);
            updateLangLinks(lang);
            applyMobileLineBreaks(lang);
        }
 
        // Language button listeners
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.getAttribute('data-lang'));
            });
        });
 
        // Initialize
        setLanguage(getSavedLanguage());
    </script>
</body>
</html>
