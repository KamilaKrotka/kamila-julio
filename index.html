<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamila & Julio - Wedding RSVP</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Courier+Prime:wght@400;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Prata&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>

        .date {
            font-family: "Courier Prime", monospace;
        }

        :root {
            --cream: #f5f1e8;
            --coral: #95390A;
            --brown: #AB623F;
            --dark: #2a2a2a;
            --light-gray: #e8e8e8;
            --beige: #e6dfd7;
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        html {
            scroll-behavior: smooth;
        }
 
body {
    font-family: 'Courier Prime', monospace;
    background-color: #f1ede3;
    color: var(--dark);
    line-height: 1.6;
    position: relative;
    overflow-x: hidden;
}

/* ==========================
   PAPER BACKGROUND TEXTURE
   ========================== */

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -2;

    background:
        radial-gradient(circle at 15% 20%, rgba(70,50,40,.22) 1px, transparent 1.5px),
        radial-gradient(circle at 75% 35%, rgba(70,50,40,.18) 1px, transparent 1.5px),
        radial-gradient(circle at 30% 80%, rgba(70,50,40,.20) 1px, transparent 1.5px),
        radial-gradient(circle at 85% 75%, rgba(70,50,40,.22) 1px, transparent 1.5px),
        radial-gradient(circle at 55% 10%, rgba(70,50,40,.15) 1px, transparent 1.5px),
        radial-gradient(circle at 10% 60%, rgba(70,50,40,.18) 1px, transparent 1.5px);

    background-size:
        180px 180px,
        220px 220px,
        160px 160px,
        250px 250px,
        190px 190px,
        210px 210px;

    opacity: 0.9;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;

    background-image:
        repeating-radial-gradient(
            circle at center,
            rgba(0,0,0,.025) 0px,
            rgba(0,0,0,.025) 1px,
            transparent 2px,
            transparent 4px
        );

    opacity: 0.06;
}
        /* Language Switcher */
        .language-switcher {
            position: fixed;
            top: 3.2rem;
            margin-left: 505px;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }
 
        .lang-btn {
            background: none;
            border: none;
            font-family: 'Inter', serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--dark);
            margin-bottom: 2rem;
        }
 
        .lang-btn.active {
            color: var(--coral);
            opacity: 1;
            font-weight: 600;
        }
 
        .lang-btn:hover {
            opacity: 1;
            color: var(--brown);
        }
 
        .lang-sep {
            color: var(--light-gray);
            margin: 0 0.25rem;
        }
 
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            right: 2rem;
            z-index: 999;
            padding: 2rem 0;
            left: 4rem;
        }
 
        nav a {
            color: var(--dark);
            text-decoration: none;
            font-size: 0.95rem;
            margin-left: 4rem;
            position: relative;
            transition: color 0.3s ease;
        }
 
        nav a:hover {
            color: var(--coral);
        }
 
        /* Hero Section */
       .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0rem 0 0rem 4rem;
    gap: 4rem;
    margin-left: 1rem;
    padding-right: 0;
    overflow: hidden;
    position: relative;
}

/* ==========================
   ORGANIC PAPER SHAPES
   ========================== */
 
        .hero-content {
            flex: 1;
            animation: fadeInUp 1s ease-out;
        }
 
        .hero-image {
            flex: 1;
            animation: fadeIn 1.2s ease-out;
            padding: 0;
            margin: 0;
            overflow: hidden;
            align-self: flex-start;  /* prevents stretching */
            background-color: rgba(149, 57, 10, 0.06); /* visible placeholder if image fails */
            min-height: 200px;
        }
 
        .hero-image img {
            width: 100%;
            height: auto;
            display: block;           /* removes inline bottom gap */
            border-radius: 0px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        } 

        .hero-image img.img-error {
            display: none;
        }

        .hero-image .img-fallback {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            color: var(--coral);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-align: center;
            padding: 2rem;
            border: 1px dashed rgba(149, 57, 10, 0.3);
        }

        .hero-image .img-fallback.active {
            display: flex;
        }
 
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
 
        .date {
            font-size: 0.95rem;
            font-family: "Courier Prime", monospace;
            color: var(--coral);
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            font-weight: 500;
        }
 
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 2rem;
            color: var(--dark);
        }
 
        .hero p {
            font-size: 1.1rem;
            color: var(--dark);
            margin-bottom: 3rem;
            max-width: 90%;
            line-height: 1.8;
        }
 
        :root {
    /* This matches the burnt-orange color in your image */
    --coral: #95390A; 
    --bg-cream: #f6f3ed;
}
 
.button-group {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
}
 
.btn {
    /* Fixed box: this is what stops the language switch from
       resizing the button. Width/height are locked regardless
       of how long the text inside is. */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 260px;
    height: 56px;
    padding: 0 1.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 0;
    font-weight: 500;
    text-decoration: none;
    text-align: center;
    white-space: nowrap;
    line-height: 1;
}
 
.btn span {
    display: inline-block;
    transform-origin: center;
}
 
.btn-primary {
    background-color: var(--coral);
    color: #ffffff;
    border: 1px solid var(--coral);
}
 
.btn-primary:hover {
    background-color: var(--brown);
    border-color: var(--brown);
}
 
.btn-secondary {
    background-color: #f1ede3;
    color: var(--coral);
    border: 1px solid var(--coral);
}
 
.btn-secondary:hover {
    background-color: rgba(149, 57, 10, 0.06);
}
 
        /* RSVP Form Section */
        .rsvp-section {
            min-height: 100vh;
            padding: 5rem;
            display: none;
            align-items: center;
            justify-content: center;
        }
 
        .rsvp-section.active {
            display: flex;
        }
 
        .rsvp-container {
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }
 
        .rsvp-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }
 
        .rsvp-container p {
            color: #666;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }
 
        .form-group {
            margin-bottom: 1.8rem;
        }
 
        label {
            display: block;
            font-size: 0.95rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
 
        h2 {
            font-family: 'Inter', sans-serif;
        }
 
        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: 1px solid var(--light-gray);
            background-color: white;
            color: var(--dark);
            border-radius: 0;
            transition: all 0.3s ease;
        }
 
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(217, 114, 57, 0.1);
        }
 
        textarea {
            resize: vertical;
            min-height: 100px;
        }
 
        .form-footer {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
        }
 
        .btn-submit {
            flex: 1;
            background-color: var(--coral);
            color: white;
        }
 
        .btn-back {
            flex: 1;
            background-color: transparent;
            color: var(--coral);
            border: 2px solid var(--coral);
        }
 
        .btn-submit:hover {
            background-color: #AB623F;
            transform: translateY(-2px);
        }
 
        .btn-back:hover {
            background-color: var(--coral);
            color: white;
        }
 
        /* Success Message */
        .success-message {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
 
        .success-message.active {
            display: block;
        }
 
        .success-message h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--coral);
        }
 
        .success-message p {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 2rem;
        }
 
        /* Responsive */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden;
            }

            .hero {
                height: 100vh;
                height: 100dvh;
                min-height: 100dvh;
                max-height: 100dvh;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                justify-content: center;
                padding: 3.75rem 1.25rem 1rem;
                gap: 0;
                overflow: hidden;
            }

            /* Let .hero-content's children become direct flex items
               of .hero, so they can be freely interleaved (via order)
               with .hero-image, which is a sibling of .hero-content
               rather than nested inside it. */
            .hero-content {
                display: contents;
            }

            .date {
                order: 1;
                width: 100%;
            }

            .hero h1 {
                order: 2;
                width: 100%;
            }

            .hero p {
                order: 3;
                width: 100%;
            }

            .hero-image {
                order: 4;
                width: 100%;
                align-self: stretch;
                margin: 0.75rem 0;
                min-height: 0;
            }

            .button-group {
                order: 5;
                width: 100%;
            }

            .hero-image img {
                width: 100%;
                height: 26vh;
                max-height: 160px;
                object-fit: cover;
                object-position: center 35%;
            }

            .hero-image .img-fallback {
                min-height: 26vh;
                max-height: 160px;
                padding: 0.75rem;
                font-size: 0.7rem;
            }

            .date {
                font-size: 0.78rem;
                margin-bottom: 0.6rem;
            }
 
            .hero h1 {
                font-size: 1.9rem;
                line-height: 1.1;
                margin-bottom: 0.6rem;
            }
 
            .hero p {
                font-size: 0.85rem;
                line-height: 1.45;
                max-width: 100%;
                margin-bottom: 0;
            }
 
            .button-group {
                flex-direction: row;
                gap: 0.6rem;
                width: 100%;
                margin-top: 0.75rem;
            }

            .btn {
                width: 100%;
                height: 42px;
                font-size: 0.68rem;
                letter-spacing: 0.08em;
                padding: 0 0.5rem;
            }
 
            nav {
                position: static;
                padding: 0;
                margin-bottom: 2rem;
            }
 
            nav a {
                display: block;
                margin: 0.5rem 0;
            }
 
            .language-switcher {
                position: fixed;
                top: 0.75rem;
                right: 0.75rem;
                left: auto;
                margin-left: 0;
                width: fit-content;
                padding: 0.4rem 0.6rem;
            }
 
            .rsvp-section {
                padding: 5rem 1.5rem 2rem;
                min-height: auto;
            }
 
            .rsvp-container h2 {
                font-size: 2rem;
            }

            .form-footer {
                flex-direction: column;
            }
        }

        /* Extra-short phones: trim further so nothing clips */
        @media (max-width: 768px) and (max-height: 700px) {
            .hero {
                padding: 3.25rem 1.25rem 0.75rem;
            }
            .hero h1 {
                font-size: 1.6rem;
                margin-bottom: 0.4rem;
            }
            .date {
                margin-bottom: 0.4rem;
            }
            .hero p {
                font-size: 0.78rem;
                line-height: 1.35;
            }
            .hero-image img,
            .hero-image .img-fallback {
                height: 20vh;
                max-height: 120px;
            }
            .button-group {
                margin-top: 0.5rem;
            }
            .btn {
                height: 38px;
                font-size: 0.62rem;
            }
        }
 
        /* Text visibility for hidden sections */
        .hidden-text {
            display: none;
        }
 
        /* Decorative element */
        .ornament {
            text-align: center;
            color: var(--coral);
            font-size: 1.5rem;
            margin: 2rem 0;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="pl">PL</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>
 
    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <div class="date lang-text" data-en="— 22.05.2027 —" data-pl="— 22.05.2027 —" data-es="— 22.05.2027 —"></div>
            <h1 class="lang-text" data-en="Kamila & Julio" data-pl="Kamila & Julio" data-es="Kamila & Julio"></h1>
            <p class="lang-text" 
               data-en="invite you to their wedding and wedding celebration in the heart of the Catalan mountains.
Join us to celebrate love together and discover the beauty of Spain."
               data-pl="zapraszają Was na swój ślub i wesele w samym sercu katalońskich gór.
Dołączcie do nas, aby wspólnie świętować miłość i odkrywać uroki Hiszpanii."
               data-es="Los invitan a su boda y a la celebración en el corazón de la sierra catalana. Únanse a nosotros para celebrar el amor y descubrir la belleza de España."></p>
            
            <div class="button-group">
                <a href="rsvp.html" class="btn btn-primary lang-link">
                    <span class="lang-text" data-en="CONFIRM PRESENCE" data-pl="POTWIERDŹ OBECNOŚĆ" data-es="CONFIRMAR PRESENCIA"></span>
                </a>
                <a href="info.html" class="btn btn-secondary lang-link">
                    <span class="lang-text" data-en="WEDDING DAY INFO" data-pl="INFORMACJE O ŚLUBIE" data-es="INFORMACIÓN DEL EVENTO"></span>
                </a>
            </div>
        </div>
        <div class="hero-image">
            <img src="miriam-espacio-ggCBI9mWPY4-unsplash.jpg" alt="Wedding landscape" onerror="this.classList.add('img-error'); this.nextElementSibling.classList.add('active');">
            <div class="img-fallback">Photo unavailable<br>(miriam-espacio-ggCBI9mWPY4-unsplash.jpg)</div>
        </div>
    </section>
 
    <script>
        // Language Management
        const STORAGE_KEY = 'weddingLang';
        const currentLanguage = { lang: 'en' };
 
        function getSavedLanguage() {
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (['en', 'pl', 'es'].includes(urlLang)) {
                return urlLang;
            }
 
            const storedLang = localStorage.getItem(STORAGE_KEY);
            if (['en', 'pl', 'es'].includes(storedLang)) {
                return storedLang;
            }
 
            return 'en';
        }
 
        function updateLangLinks(lang) {
            document.querySelectorAll('a.lang-link').forEach(link => {
                const href = link.getAttribute('href') || '';
                const [pathWithQuery, hash = ''] = href.split('#');
                const [path] = pathWithQuery.split('?');
                const newHref = path + '?lang=' + encodeURIComponent(lang) + (hash ? '#' + hash : '');
                link.setAttribute('href', newHref);
            });
        }
 
        function setLanguage(lang) {
            currentLanguage.lang = lang;
            
            // Update active language button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
 
            // Update all text elements
            document.querySelectorAll('.lang-text').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) {
                    el.textContent = text;
                }
            });
 
            // Auto-shrink button label text if a translation is too wide
            // for the fixed button box, instead of letting the box grow.
            document.querySelectorAll('.btn span.lang-text').forEach(span => {
                span.style.transform = 'scale(1)';
                const btn = span.closest('.btn');
                if (!btn) return;
                const available = btn.clientWidth - 32; // minus horizontal padding
                const needed = span.scrollWidth;
                if (needed > available) {
                    const scale = Math.max(0.78, available / needed);
                    span.style.transform = `scale(${scale})`;
                }
            });
 
            localStorage.setItem(STORAGE_KEY, lang);
            updateLangLinks(lang);
        }
 
        // Language button listeners
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.getAttribute('data-lang'));
            });
        });
 
        // Initialize
        setLanguage(getSavedLanguage());
    </script>
</body>
</html>
