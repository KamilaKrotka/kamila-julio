<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamila & Julio - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Courier+Prime:wght@400;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Prata&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f1e8;
            --coral: #95390A;
            --brown: #AB623F;
            --dark: #2a2a2a;
            --light-gray: #e8e8e8;
            --beige: #e6dfd7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color:#f1ede3;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        
        /* ==========================
   PAPER BACKGROUND TEXTURE
   ========================== */

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -2;

    background:
        radial-gradient(circle at 15% 20%, rgba(70,50,40,.22) 1px, transparent 1.5px),
        radial-gradient(circle at 75% 35%, rgba(70,50,40,.18) 1px, transparent 1.5px),
        radial-gradient(circle at 30% 80%, rgba(70,50,40,.20) 1px, transparent 1.5px),
        radial-gradient(circle at 85% 75%, rgba(70,50,40,.22) 1px, transparent 1.5px),
        radial-gradient(circle at 55% 10%, rgba(70,50,40,.15) 1px, transparent 1.5px),
        radial-gradient(circle at 10% 60%, rgba(70,50,40,.18) 1px, transparent 1.5px);

    background-size:
        180px 180px,
        220px 220px,
        160px 160px,
        250px 250px,
        190px 190px,
        210px 210px;

    opacity: 0.6;
}


        h1 {
            font-family: 'Playfair Display', serif;
        }

        h2 {
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: transparent;
            padding: 3rem 2rem;
            box-shadow: none;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 260px;
            height: 56px;
            padding: 0 1.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.25s ease;
            border-radius: 0;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
        }

        .btn span {
            display: inline-block;
            transform-origin: center;
        }

        .btn-primary {
            background-color: var(--coral);
            color: #ffffff;
            border: 1px solid var(--coral);
        }

        .btn-primary:hover {
            background-color: var(--brown);
            border-color: var(--brown);
        }

        .btn-secondary {
            background-color: #f1ede3;
            color: var(--coral);
            border: 1px solid var(--coral);
}

        .btn-secondary:hover {
            background-color: rgba(149, 57, 10, 0.06);
        }

        .form-group { margin-bottom: 3.2rem; }

        label { display: block; margin-bottom: 0.85rem; font-weight: 500; }
        input, select, textarea {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--light-gray);
            background-color: white; color: var(--dark); border-radius: 0;
        }

        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px rgba(217,114,57,.1); }

        .form-footer { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; margin-top: 1rem; }

        .success-message { display: none; text-align: center; }
        .success-message.active { display: block; }

        .language-switcher {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Inter', serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--dark);
            margin-bottom: 2rem;
        }

        .lang-btn.active {
            color: var(--coral);
            opacity: 1;
            font-weight: 600;
        }

        .lang-btn:hover {
            opacity: 1;
            color: var(--brown);
        }

        .lang-sep {
            color: var(--light-gray);
            margin: 0 0.25rem;
        }


        @media (max-width: 768px) {
            body { padding: 1rem; }
            .form-footer { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="pl">PL</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="date lang-text" data-en="— 22.05.2027 —" data-pl="— 22.05.2027 —" data-es="— 22.05.2027 —"></div>
            <h1 class="lang-text" data-en="Kamila & Julio RSVP" data-pl="Kamila & Julio RSVP" data-es="Kamila & Julio RSVP"></h1>
        </div>

        <form id="form" action="https://formsubmit.co/ajax/402cfaf3a2211b2367a478d9c3b899fd" method="POST">
            <input type="hidden" name="_next" value="https://kamila-julio.vercel.app/rsvp.html">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New RSVP submission">
            <div class="form-group">
                <label class="lang-text" data-en="Full name*" data-pl="Imię i nazwisko*" data-es="Nombre completo*"></label>
                <input type="text" name="name" required>
            </div>
          <div class="form-group">
    <label class="lang-text" data-en="Will you be attending?*" data-pl="Czy będziesz obecny/a?*" data-es="¿Asistirás?*"></label>
    <select name="attendance" required>
        <option value="">-- Select --</option>
        <option value="yes" data-en="Yes!" data-pl="Tak!" data-es="Sí, estaré allá">Yes!</option>
        <option value="no" data-en="No, I can't make it" data-pl="Niestety nie" data-es="No puedo asistir">No, I can't make it</option>
    </select>
</div>

<div class="form-group">
    <label class="lang-text" data-en="Number of guests (including yourself)*" data-pl="Liczba osób (w tym Ty)*" data-es="Número de huéspedes (incluido tú)*"></label>
    <select name="guests" required>
        <option value="1" selected>1</option>
        <option value="2">2</option>
    </select>
</div>

<div class="form-group">
    <label class="lang-text" data-en="Veggie, vegan, or any allergies?" data-pl="Dieta wegetariańska, wegańska lub alergie?" data-es="¿Eres vege, vegano/a o tienes alergias?"></label>
    <textarea name="dietary" style="resize: none; height: 43px; min-height: 43px; overflow: hidden; line-height: 1.5; padding: 8px;"></textarea>
</div>

<div class="form-footer">
    <a href="index.html" class="btn btn-secondary lang-text lang-link" data-en="BACK" data-pl="WSTECZ" data-es="VOLVER">BACK</a>
    <button type="submit" class="btn btn-primary lang-text" data-en="SUBMIT RSVP" data-pl="WYŚLIJ POTWIERDZENIE" data-es="ENVIAR CONFIRMACIÓN">SUBMIT RSVP</button>
</div>

    <script>
        const currentLanguage = { lang: 'en' };

        const translations = {
            en: { 'attendance-yes': "Yes!", 'attendance-no': "I can't make it"},
            pl: { 'attendance-yes': 'Tak!', 'attendance-no': 'Niestety nie'},
            es: { 'attendance-yes': 'Sí!', 'attendance-no': 'No puedo asistir'},
        };

        const STORAGE_KEY = 'weddingLang';

        function getSavedLanguage() {
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (['en', 'pl', 'es'].includes(urlLang)) {
                return urlLang;
            }

            const storedLang = localStorage.getItem(STORAGE_KEY);
            if (['en', 'pl', 'es'].includes(storedLang)) {
                return storedLang;
            }

            return 'en';
        }

        function updateLangLinks(lang) {
            document.querySelectorAll('a.lang-link').forEach(link => {
                const href = link.getAttribute('href') || '';
                const [pathWithQuery, hash = ''] = href.split('#');
                const [path] = pathWithQuery.split('?');
                const newHref = path + '?lang=' + encodeURIComponent(lang) + (hash ? '#' + hash : '');
                link.setAttribute('href', newHref);
            });
        }

        function setLanguage(lang) {
            currentLanguage.lang = lang;
            localStorage.setItem(STORAGE_KEY, lang);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            document.querySelectorAll('.lang-text').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.textContent = text;
            });

            const attendanceSelect = document.querySelector('select[name="attendance"]');
            if (attendanceSelect) {
                attendanceSelect.querySelector('option[value="yes"]').textContent = translations[lang]['attendance-yes'];
                attendanceSelect.querySelector('option[value="no"]').textContent = translations[lang]['attendance-no'];
                attendanceSelect.querySelector('option[value="maybe"]').textContent = translations[lang]['attendance-maybe'];
            }

            updateLangLinks(lang);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));

        const form = document.getElementById('form');
        const successMessage = document.getElementById('successMessage');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const formData = new FormData(form);

                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                    },
                    body: formData,
                });

                const resultText = await response.text();
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status} ${resultText}`);
                }

                form.style.display = 'none';
                successMessage.classList.add('active');
            } catch (err) {
                console.error(err);
                alert(`There was an error submitting your RSVP: ${err.message}`);
            }
        });

        setLanguage(getSavedLanguage());
    </script>
</body>
</html>
