<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamila & Julio - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Courier+Prime:wght@400;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Prata&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f1e8;
            --coral: #95390A;
            --brown: #AB623F;
            --dark: #2a2a2a;
            --light-gray: #e8e8e8;
            --beige: #e6dfd7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color:#f1ede3;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        /* ==========================
           PAPER BACKGROUND TEXTURE
           ========================== */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;

            background:
                radial-gradient(circle at 15% 20%, rgba(70,50,40,.22) 1px, transparent 1.5px),
                radial-gradient(circle at 75% 35%, rgba(70,50,40,.18) 1px, transparent 1.5px),
                radial-gradient(circle at 30% 80%, rgba(70,50,40,.20) 1px, transparent 1.5px),
                radial-gradient(circle at 85% 75%, rgba(70,50,40,.22) 1px, transparent 1.5px),
                radial-gradient(circle at 55% 10%, rgba(70,50,40,.15) 1px, transparent 1.5px),
                radial-gradient(circle at 10% 60%, rgba(70,50,40,.18) 1px, transparent 1.5px);

            background-size:
                180px 180px,
                220px 220px,
                160px 160px,
                250px 250px,
                190px 190px,
                210px 210px;

            opacity: 0.6;
        }

        h1 {
            font-family: 'Courier Prime', monospace;
        }

        h2 {
            font-family: 'Courier Prime', monospace;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: transparent;
            padding: 3rem 2rem;
            box-shadow: none;
        }

        .date {
            font-family: 'Courier Prime', monospace;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 3rem;
        }

        /* ==========================
           STRUCTURE DWUKOLUMNOWA (GRID)
           ========================= */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            padding: 20px 0;
            align-items: center;
        }

        .form-group label {
            margin: 0;
            color: var(--dark);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            line-height: 1.3;
        }

        .grid-divider {
            border: 0;
            height: 1px;
            background-color: rgba(149, 57, 10, 0.15);
            margin: 0;
        }

        /* ==========================
           POLE WEJŚCIOWE FORMULARZA
           ========================== */
        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(149, 57, 10, 0.25);
            background-color: transparent;
            color: var(--dark);
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(149, 57, 10, 0.08);
        }

        /* Stopka z przyciskami w prawej kolumnie */
        .form-footer {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            margin-top: 2rem;
        }

        .form-footer-buttons {
            grid-column: 2;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* ==========================
           PRZYCISKI (BUTTONS)
           ========================== */
        .btn {
            padding: 0.85rem 1.6rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 0;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 11rem;
            max-width: 16rem;
            white-space: normal;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--coral);
            color: white;
            border: 1px solid var(--coral);
        }

        .btn-primary:hover { background-color: var(--brown); }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        a.btn.btn-secondary {
            display: inline-flex !important;
            background-color: #f1ede3 !important;
            color: var(--coral) !important;
            border: 1px solid var(--coral) !important;
            text-decoration: none !important;
        }

        a.btn.btn-secondary:hover {
            background-color: rgba(200, 90, 26, 0.05) !important;
            color: var(--coral) !important;
        }

        /* JĘZYKI */
        .language-switcher {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Inter', serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--dark);
            margin-bottom: 2rem;
        }

        .lang-btn.active {
            color: var(--coral);
            opacity: 1;
            font-weight: 600;
        }

        .lang-btn:hover {
            opacity: 1;
            color: var(--brown);
        }

        .lang-sep {
            color: var(--light-gray);
            margin: 0 0.25rem;
        }

        /* ==========================
           SUCCESS MESSAGE
           ========================== */
        .success-message {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
        }

        .success-message.active {
            display: block;
        }

        .success-message h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--coral);
        }

        .success-message p {
            font-size: 1rem;
            color: var(--dark);
            margin-bottom: 2rem;
        }

        .form-error {
            display: none;
            background-color: rgba(149, 57, 10, 0.06);
            border: 1px solid var(--coral);
            color: var(--coral);
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-error.active {
            display: block;
        }

        /* RESPONSYWNOŚĆ (MOBILE) */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            
            .form-group, .form-footer {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 12px 0;
            }
            
            .form-footer-buttons {
                grid-column: 1;
                flex-direction: column;
                width: 100%;
            }
            .btn {
                max-width: 100%;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="pl">PL</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="date lang-text" data-en="— 22.05.2027 —" data-pl="— 22.05.2027 —" data-es="— 22.05.2027 —"></div>
            <h1 class="lang-text" data-en="Kamila & Julio" data-pl="Kamila & Julio" data-es="Kamila & Julio"></h1>
        </div>

        <!-- FORMULARZ RSVP -->
        <form id="rsvp-form" action="https://formsubmit.co/ajax/kamkrotka@gmail.com" method="POST">
            <input type="hidden" name="_subject" value="New Wedding RSVP">

            <div class="form-error" id="formError">
                <span class="lang-text" data-en="Something went wrong sending your RSVP. Please try again, or message us directly." data-pl="Coś poszło nie tak podczas wysyłania potwierdzenia. Spróbuj ponownie lub napisz do nas bezpośrednio." data-es="Algo salió mal al enviar tu confirmación. Por favor, inténtalo de nuevo o escríbenos directamente."></span>
            </div>

            <div class="form-group">
                <label class="lang-text" data-en="Full Name*" data-pl="Imię i nazwisko*" data-es="Nombre y apellido*"></label>
                <input type="text" name="name" required>
            </div>

            <hr class="grid-divider">

            <div class="form-group">
                <label class="lang-text" data-en="Will you attend?*" data-pl="Czy będziesz obecny/a?*" data-es="¿Asistirás?*"></label>
                <select name="attendance" required>
                    <option value="" class="lang-text" data-en="-- Select --" data-pl="-- Wybierz --" data-es="-- Seleccionar --"></option>
                    <option value="yes" class="lang-text" data-en="Yes!" data-pl="Tak!" data-es="¡Sí!"></option>
                    <option value="no" class="lang-text" data-en="Unfortunately I can't" data-pl="Niestety nie mogę" data-es="No, no puedo"></option>
                </select>
            </div>

            <hr class="grid-divider">

            <div class="form-group">
                <label class="lang-text" data-en="Number of guests (including you)*" data-pl="Liczba osób (w tym Ty)*" data-es="Número de personas (contándote a ti)*"></label>
                <select name="guests" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>

            <hr class="grid-divider">

            <div class="form-group">
                <label class="lang-text" data-en="Dietary requirements or allergies" data-pl="Dieta wegetariańska, wegańska lub alergie?" data-es="¿Dieta vegetariana, vegana o allergies?"></label>
                <textarea name="diet" rows="2"></textarea>
            </div>

            <div class="form-footer">
                <div class="form-footer-buttons">
                    <a href="kamila-julio/index.html" class="btn btn-secondary lang-text" data-en="BACK" data-pl="WSTECZ" data-es="VOLVER">BACK</a>
                    <button type="submit" class="btn btn-primary lang-text" id="submitBtn" data-en="SEND RSVP" data-pl="WYŚLIJ POTWIERDZENIE" data-es="ENVIAR CONFIRMACIÓN">SEND RSVP</button>
                </div>
            </div>
        </form>

        <!-- SUCCESS MESSAGE -->
        <div class="success-message" id="successMessage">
            <h2 class="lang-text" data-en="Thank You!" data-pl="Dziękujemy!" data-es="¡Gracias!"></h2>
            <p class="lang-text"
               data-en="We've received your RSVP. See you soon!"
               data-pl="Otrzymaliśmy Twoje potwierdzenie. Do zobaczenia!"
               data-es="Hemos recibido tu confirmación. ¡Nos vemos pronto!"></p>
            <a href="kamila-julio/index.html" class="btn btn-primary lang-text" data-en="BACK TO HOME" data-pl="WRÓĆ NA STRONĘ GŁÓWNĄ" data-es="VOLVER AL INICIO"></a>
        </div>

    </div>

    <script>
        const STORAGE_KEY = 'weddingLang';

        function getSavedLanguage() {
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (['en', 'pl', 'es'].includes(urlLang)) {
                return urlLang;
            }

            const storedLang = localStorage.getItem(STORAGE_KEY);
            if (['en', 'pl', 'es'].includes(storedLang)) {
                return storedLang;
            }

            return 'en';
        }

        function updateLangLinks(lang) {
            document.querySelectorAll('a.lang-link').forEach(link => {
                const href = link.getAttribute('href') || '';
                const [pathWithQuery, hash = ''] = href.split('#');
                const [path] = pathWithQuery.split('?');
                const newHref = path + '?lang=' + encodeURIComponent(lang) + (hash ? '#' + hash : '');
                link.setAttribute('href', newHref);
            });
        }

        function setLanguage(lang) {
            localStorage.setItem(STORAGE_KEY, lang);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            document.querySelectorAll('.lang-text').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.setAttribute('placeholder', text);
                    } else {
                        el.textContent = text;
                    }
                }
            });

            updateLangLinks(lang);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));

        setLanguage(getSavedLanguage());

        // ==========================
        // FORM SUBMISSION
        // ==========================
        const form = document.getElementById('rsvp-form');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const formError = document.getElementById('formError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            formError.classList.remove('active');
            submitBtn.disabled = true;

            try {
                const formData = new FormData(form);

                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json'
                    },
                    body: formData
                });

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`Server error: ${response.status} ${text}`);
                }

                form.style.display = 'none';
                successMessage.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                formError.classList.add('active');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
