<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamila & Julio - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f1e8;
            --coral: #95390A;
            --brown: #AB623F;
            --dark: #2a2a2a;
            --light-gray: #e8e8e8;
            --beige: #e6dfd7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
        }

        h2 {
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,.08);
        }

        .top-bar {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.85rem 1.6rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 0;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 11rem;
            max-width: 16rem;
            white-space: normal;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--coral);
            color: white;
            border: 1px solid var(--coral);
        }

        .btn-primary:hover { background-color: var(--brown); }

        .btn-secondary {
            background-color: transparent;
            color: var(--coral);
            border: 1px solid var(--coral);
        }

        .btn-secondary:hover {
            background-color: rgba(200, 90, 26, 0.05);
            color: var(--coral);
        }

        .form-group { margin-bottom: 1.8rem; }

        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select, textarea {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--light-gray);
            background-color: white; color: var(--dark); border-radius: 0;
        }

        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px rgba(217,114,57,.1); }

        .form-footer { display: flex; gap: 1rem; flex-wrap: wrap; }

        .success-message { display: none; text-align: center; }
        .success-message.active { display: block; }

        .language-switcher {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Inter', serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--dark);
            margin-bottom: 2rem;
        }

        .lang-btn.active {
            color: var(--coral);
            opacity: 1;
            font-weight: 600;
        }

        .lang-btn:hover {
            opacity: 1;
            color: var(--brown);
        }

        .lang-sep {
            color: var(--light-gray);
            margin: 0 0.25rem;
        }


        @media (max-width: 768px) {
            body { padding: 1rem; }
            .form-footer { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="pl">PL</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="date lang-text" data-en="— 22.05.2027 —" data-pl="— 22.05.2027 —" data-es="— 22.05.2027 —"></div>
            <h1 class="lang-text" data-en="Kamila & Julio RSVP" data-pl="Kamila & Julio RSVP" data-es="Kamila & Julio RSVP"></h1>
            <p class="lang-text" data-en="Please confirm your attendance for the wedding." data-pl="Prosimy o potwierdzenie obecności na weselu." data-es="Por favor confirma tu asistencia a la boda."></p>
        </div>

        <form id="form" action="https://formsubmit.co/ajax/402cfaf3a2211b2367a478d9c3b899fd" method="POST">
            <input type="hidden" name="_next" value="https://kamila-julio.vercel.app/rsvp.html">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New RSVP submission">
            <div class="form-group">
                <label class="lang-text" data-en="Full Name *" data-pl="Pełne Imię i Nazwisko *" data-es="Nombre Completo *"></label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label class="lang-text" data-en="Email Address *" data-pl="Adres E-mail *" data-es="Correo Electrónico *"></label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label class="lang-text" data-en="Will You Be Attending? *" data-pl="Czy Będziesz Obecny/a? *" data-es="¿Asistirás? *"></label>
                <select name="attendance" required>
                    <option value="">-- Select --</option>
                    <option value="yes" data-en="Yes, I\'ll be there" data-pl="Tak, będę tam" data-es="Sí, estaré allá">Yes, I\'ll be there</option>
                    <option value="no" data-en="No, I can\'t make it" data-pl="Nie, nie mogę przyjść" data-es="No, no puedo asistir">No, I can\'t make it</option>
                    <option value="maybe" data-en="Maybe" data-pl="Może" data-es="Quizás">Maybe</option>
                </select>
            </div>
            <div class="form-group">
                <label class="lang-text" data-en="Number of Guests (including yourself)" data-pl="Liczba Gości (w tym Ty)" data-es="Número de Huéspedes (incluido tú)"></label>
                <input type="number" name="guests" min="1" value="1">
            </div>
            <div class="form-group">
                <label class="lang-text" data-en="Dietary Restrictions" data-pl="Ograniczenia Dietetyczne" data-es="Restricciones Dietéticas"></label>
                <textarea name="dietary"></textarea>
            </div>
            <div class="form-group">
                <label class="lang-text" data-en="Additional Comments" data-pl="Dodatkowe Uwagi" data-es="Comentarios Adicionales"></label>
                <textarea name="comments"></textarea>
            </div>
            <div class="form-footer">
                <a href="index.html" class="btn btn-secondary lang-text lang-link" data-en="BACK" data-pl="WSTECZ" data-es="VOLVER">BACK</a>
                <button type="submit" class="btn btn-primary lang-text" data-en="SUBMIT RSVP" data-pl="WYŚLIJ POTWIERDZENIE" data-es="ENVIAR CONFIRMACIÓN">SUBMIT RSVP</button>
            </div>
        </form>

        <div class="success-message" id="successMessage">
            <h2 class="lang-text" data-en="Thank You!" data-pl="Dziękujemy!" data-es="¡Gracias!">Thank You!</h2>
            <p class="lang-text" data-en="We've received your RSVP. See you soon!" data-pl="Otrzymaliśmy Twoje potwierdzenie. Do zobaczenia!" data-es="Hemos recibido tu confirmación. ¡Nos vemos pronto!">We've received your RSVP. See you soon!</p>
            <a href="index.html" class="btn btn-primary lang-text" data-en="BACK TO HOME" data-pl="WRÓĆ NA STRONĘ GŁÓWNĄ" data-es="VOLVER AL INICIO">BACK TO HOME</a>
        </div>
    </div>

    <script>
        const currentLanguage = { lang: 'en' };

        const translations = {
            en: { 'attendance-yes': "Yes, I'll be there", 'attendance-no': "No, I can't make it", 'attendance-maybe': 'Maybe' },
            pl: { 'attendance-yes': 'Tak, będę tam', 'attendance-no': 'Nie, nie mogę przyjść', 'attendance-maybe': 'Może' },
            es: { 'attendance-yes': 'Sí, estaré allá', 'attendance-no': 'No, no puedo asistir', 'attendance-maybe': 'Quizás' },
        };

        const STORAGE_KEY = 'weddingLang';

        function getSavedLanguage() {
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (['en', 'pl', 'es'].includes(urlLang)) {
                return urlLang;
            }

            const storedLang = localStorage.getItem(STORAGE_KEY);
            if (['en', 'pl', 'es'].includes(storedLang)) {
                return storedLang;
            }

            return 'en';
        }

        function updateLangLinks(lang) {
            document.querySelectorAll('a.lang-link').forEach(link => {
                const href = link.getAttribute('href') || '';
                const [pathWithQuery, hash = ''] = href.split('#');
                const [path] = pathWithQuery.split('?');
                const newHref = path + '?lang=' + encodeURIComponent(lang) + (hash ? '#' + hash : '');
                link.setAttribute('href', newHref);
            });
        }

        function setLanguage(lang) {
            currentLanguage.lang = lang;
            localStorage.setItem(STORAGE_KEY, lang);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            document.querySelectorAll('.lang-text').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.textContent = text;
            });

            const attendanceSelect = document.querySelector('select[name="attendance"]');
            if (attendanceSelect) {
                attendanceSelect.querySelector('option[value="yes"]').textContent = translations[lang]['attendance-yes'];
                attendanceSelect.querySelector('option[value="no"]').textContent = translations[lang]['attendance-no'];
                attendanceSelect.querySelector('option[value="maybe"]').textContent = translations[lang]['attendance-maybe'];
            }

            updateLangLinks(lang);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));

        const form = document.getElementById('form');
        const successMessage = document.getElementById('successMessage');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const formData = new FormData(form);

                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                    },
                    body: formData,
                });

                const resultText = await response.text();
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status} ${resultText}`);
                }

                form.style.display = 'none';
                successMessage.classList.add('active');
            } catch (err) {
                console.error(err);
                alert(`There was an error submitting your RSVP: ${err.message}`);
            }
        });

        setLanguage(getSavedLanguage());
    </script>
</body>
</html>
