<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamila & Julio - RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Courier+Prime:wght@400;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Prata&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f1e8;
            --coral: #95390A;
            --brown: #AB623F;
            --dark: #2a2a2a;
            --light-gray: #e8e8e8;
            --beige: #e6dfd7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color:#f1ede3;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        /* ==========================
           PAPER BACKGROUND TEXTURE
           ========================== */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;

            background:
                radial-gradient(circle at 15% 20%, rgba(70,50,40,.22) 1px, transparent 1.5px),
                radial-gradient(circle at 75% 35%, rgba(70,50,40,.18) 1px, transparent 1.5px),
                radial-gradient(circle at 30% 80%, rgba(70,50,40,.20) 1px, transparent 1.5px),
                radial-gradient(circle at 85% 75%, rgba(70,50,40,.22) 1px, transparent 1.5px),
                radial-gradient(circle at 55% 10%, rgba(70,50,40,.15) 1px, transparent 1.5px),
                radial-gradient(circle at 10% 60%, rgba(70,50,40,.18) 1px, transparent 1.5px);

            background-size:
                180px 180px,
                220px 220px,
                160px 160px,
                250px 250px,
                190px 190px,
                210px 210px;

            opacity: 0.9;
        }

        h1 {
            font-family: 'Courier Prime', monospace;
        }

        h2 {
            font-family: 'Courier Prime', monospace;
        }

        a {
            color: var(--coral);
            text-decoration: none;
        }

        a:hover {
            color: var(--brown);
        }

        .container {
            max-width: 800px; /* Zwiększone z 700px, żeby układ dwukolumnowy wyglądał czytelnie */
            margin: 0 auto;
            background: transparent;
            padding: 3rem 2rem;
            box-shadow: none;
        }

        .date {
            font-size: 0.95rem;
            font-family: 'Courier Prime', monospace;
            color: var(--coral);
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 3rem;
        }

        /* ==========================
           NOWA STRUKTURA DWUKOLUMNOWA (GRID)
           ========================== */
        .info-sections {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .grid-section {
            display: grid;
            grid-template-columns: 1fr 2fr; /* Lewa kolumna: 1 część szerokości, prawa: 2 części */
            gap: 40px;
            padding: 20px 0;
            align-items: first baseline; /* Wyrównuje nagłówek do pierwszej linii tekstu po prawej */
        }

        .grid-title h2 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: var(--coral);
        }

        .grid-content {
            font-size: 1rem;
            line-height: 1.6;
        }

        .grid-divider {
            border: 0;
            height: 1px;
            background-color: rgba(149, 57, 10, 0.15); /* Subtelna koralowa linia podziału */
            margin: 0;
        }

        /* ==========================
           BUTTONS & FORM ELEMENTS
           ========================== */
        .btn {
            padding: 0.85rem 1.6rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 0;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 11rem;
            max-width: 16rem;
            white-space: normal;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--coral);
            color: white;
            border: 1px solid var(--coral);
        }

        .btn-primary:hover { background-color: var(--brown); }

        .btn-secondary {
            background-color: #f1ede3;
            color: var(--coral);
            border: 1px solid var(--coral);
        }

        .btn-secondary:hover {
            background-color: rgba(200, 90, 26, 0.05);
            color: var(--coral);
        }

        .form-group { margin-bottom: 1.8rem; }

        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select, textarea {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--light-gray);
            background-color: white; color: var(--dark); border-radius: 0;
        }

        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px rgba(217,114,57,.1); }

        .form-footer { display: flex; gap: 1rem; flex-wrap: wrap; }

        .success-message { display: none; text-align: center; }
        .success-message.active { display: block; }

        .language-switcher {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
        }

        .lang-btn {
            background: none;
            border: none;
            font-family: 'Inter', serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--dark);
            margin-bottom: 2rem;
        }

        .lang-btn.active {
            color: var(--coral);
            opacity: 1;
            font-weight: 600;
        }

        .lang-btn:hover {
            opacity: 1;
            color: var(--brown);
        }

        .lang-sep {
            color: var(--light-gray);
            margin: 0 0.25rem;
        }

        /* RWD: Na telefonach wracamy do jednej kolumny, żeby tekst się nie ściskał */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .form-footer { flex-direction: column; }
            
            .grid-section {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 15px 0;
            }
            .grid-title h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="pl">PL</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="date lang-text" data-en="— 22.05.2027 —" data-pl="— 22.05.2027 —" data-es="— 22.05.2027 —"></div>
            <h1 class="lang-text" data-en="Kamila & Julio" data-pl="Kamila & Julio" data-es="Kamila & Julio"></h1>
        </div>

        <div class="info-sections">
            
            <!-- SEKCJA 1: UROCZYSTOŚĆ -->
            <div class="grid-section">
                <div class="grid-title">
                    <h2 class="lang-text" data-en="THE CELEBRATION" data-pl="UROCZYSTOŚĆ" data-es="LA CELEBRACIÓN"></h2>
                </div>
                <div class="grid-content">
                    <p>
                        <strong class="lang-text" data-en="Church Ceremony" data-pl="Ślub w kościele" data-es="Ceremonia Religiosa"></strong><br>
                        <a href="https://maps.app.goo.gl/H7i2UPFWhgUpZrVu6" target="_blank">Església de Sant Andreu de Sagàs</a> | 22.05.2026 | 16:00
                    </p>
                    <p style="margin-top: 1rem;">
                        <strong class="lang-text" data-en="Wedding Party" data-pl="Wesele" data-es="Banquete y Fiesta"></strong><br>
                        <a href="https://maps.app.goo.gl/BNmfxL95TtsJcveGA" target="_blank">Cal Cirera</a>
                    </p>
                </div>
            </div>

            <hr class="grid-divider">

            <!-- SEKCJA 2: TRANSPORT -->
            <div class="grid-section">
                <div class="grid-title">
                    <h2 class="lang-text" data-en="TRANSPORT" data-pl="TRANSPORT" data-es="TRANSPORTE"></h2>
                </div>
                <div class="grid-content">
                    <p class="lang-text" data-en="Heading straight to the ceremony on Saturday? A shuttle bus will be provided from Barcelona to Església de Sant Andreu de Sagàs, and then to Cal Cirera. Return transport will also be provided at the end of the night." data-pl="Planujesz przyjechać w sobotę bezpośrednio na ceremonię? Zapewniamy transport autokarem z Barcelony do Església de Sant Andreu de Sagàs, a po ślubie do Cal Cirera. Autokar powrotny w nocy również będzie na Was czekał." data-es="¿Vienes directamente a la ceremonia el sábado? Habrá un servicio de autobús desde Barcelona hasta la Església de Sant Andreu de Sagàs, y después hacia Cal Cirera. También habrá transporte de vuelta al final de la noche."></p>
                    <p class="lang-text" style="margin-top: 1rem;" data-en="Details coming soon!" data-pl="Szczegóły już wkrótce!" data-es="¡Pronto compartiremos más detalles!"></p>
                </div>
            </div>

            <hr class="grid-divider">

            <!-- SEKCJA 3: KONTAKT -->
            <div class="grid-section">
                <div class="grid-title">
                    <h2 class="lang-text" data-en="CONTACT" data-pl="KONTAKT" data-es="CONTACTO"></h2>
                </div>
                <div class="grid-content">
                    <p class="lang-text" data-en="If you have any questions, feel free to reach out via WhatsApp:" data-pl="W razie pytań, śmiało piszcie do nas na WhatsAppie:" data-es="Si tenéis cualquier duda, podéis escribirnos por WhatsApp:"></p>
                    <p style="margin-top: 0.75rem;">
                        Kamila +48 696 551 424<br>
                        Julio +44 7423 223525
                    </p>
                </div>
            </div>

        </div>

        <a href="index.html" 
           class="btn btn-secondary lang-text lang-link" 
           data-en="BACK" 
           data-pl="WSTECZ" 
           data-es="VOLVER">
           BACK
        </a>   

    </div>

    <script>
        const STORAGE_KEY = 'weddingLang';

        function getSavedLanguage() {
            const urlLang = new URLSearchParams(window.location.search).get('lang');
            if (['en', 'pl', 'es'].includes(urlLang)) {
                return urlLang;
            }

            const storedLang = localStorage.getItem(STORAGE_KEY);
            if (['en', 'pl', 'es'].includes(storedLang)) {
                return storedLang;
            }

            return 'en';
        }

        function updateLangLinks(lang) {
            document.querySelectorAll('a.lang-link').forEach(link => {
                const href = link.getAttribute('href') || '';
                const [pathWithQuery, hash = ''] = href.split('#');
                const [path] = pathWithQuery.split('?');
                const newHref = path + '?lang=' + encodeURIComponent(lang) + (hash ? '#' + hash : '');
                link.setAttribute('href', newHref);
            });
        }

        function setLanguage(lang) {
            localStorage.setItem(STORAGE_KEY, lang);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            document.querySelectorAll('.lang-text').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.textContent = text;
            });

            updateLangLinks(lang);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));

        setLanguage(getSavedLanguage());
    </script>
</body>
</html>
